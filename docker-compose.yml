services:
  nginx:
    image: nginx:1.27-alpine
    ports: ["8080:80"]
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html:cached
    depends_on: [redis]
    environment:
      APP_ENV: local
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work redis --tries=3 --timeout=180 --sleep=1
    volumes:
      - ./:/var/www/html:cached
    depends_on: [redis, selenium]
    environment:
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      SELENIUM_HOST: http://selenium:4444
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes: [redis-data:/data]

  selenium:
    image: selenium/standalone-chromium:latest
    shm_size: 2gb
    ports: ["4444:4444"]
    environment:
      SE_NODE_MAX_SESSIONS: 4
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"

volumes:
  redis-data:
